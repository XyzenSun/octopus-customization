name: changelog

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  changelog:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          # Prefer ACTION_TOKEN if set (PAT with contents:write for protected branches);
          # fall back to GITHUB_TOKEN so missing secret does not pass empty token.
          token: ${{ secrets.ACTION_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Generate changelog and create GitHub Release
        run: npx changelogithub
        env:
          GITHUB_TOKEN: ${{ secrets.ACTION_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Merge dev to main branch
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'github-actions@github.com'
          git fetch origin dev main
          if ! git show-ref --verify --quiet refs/remotes/origin/main; then
            echo "origin/main does not exist; creating main from current tag commit"
            git checkout -B main
          else
            git checkout -B main origin/main
          fi
          git merge origin/dev
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.ACTION_TOKEN || secrets.GITHUB_TOKEN }}
